<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Lab — free-scan paper trading</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{ --bg:#0b0e13; --card:#131922; --line:#222b38; --tx:#e6edf3; --mut:#8b97a6; --grn:#3fb950; --red:#f85149; --blu:#58a6ff; --am:#e0b341; --vio:#a78bfa; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx); font-family:'Segoe UI',-apple-system,Roboto,Arial,sans-serif; padding:18px; max-width:1080px; margin:0 auto; }
  h1{ font-size:20px; font-weight:600; display:flex; align-items:center; gap:10px; }
  .badge{ font-size:10px; font-weight:700; letter-spacing:0.12em; padding:3px 8px; border-radius:5px; }
  .b-model{ background:rgba(167,139,250,0.15); color:var(--vio); border:1px solid rgba(167,139,250,0.4); }
  .b-paper{ background:rgba(224,179,65,0.13); color:var(--am); border:1px solid rgba(224,179,65,0.4); }
  .sub{ color:var(--mut); font-size:12px; margin-top:4px; }
  .cards{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin:16px 0; }
  .c{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .c .l{ font-size:11px; color:var(--mut); letter-spacing:0.08em; text-transform:uppercase; } .c .v{ font-size:22px; font-weight:600; margin-top:4px; }
  .pos{ color:var(--grn); } .neg{ color:var(--red); }
  .panels{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media (max-width:820px){ .panels{ grid-template-columns:1fr; } .cards{ grid-template-columns:repeat(2,1fr); } }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .panel .hd{ display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); }
  .panel .hd .nm{ font-weight:700; font-size:14px; }
  .panel .hd .st{ font-size:11px; color:var(--mut); margin-left:auto; text-align:right; }
  .panel .hd .dir{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; }
  .dir.long{ background:rgba(63,185,80,0.15); color:var(--grn); } .dir.short{ background:rgba(248,81,73,0.15); color:var(--red); }
  .chart{ height:260px; }
  .feed{ display:flex; flex-direction:column; gap:8px; }
  .row{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 13px; }
  .row .top{ display:flex; gap:10px; align-items:center; font-size:13px; }
  .row .r{ margin-left:auto; font-weight:700; }
  .row .why{ font-size:12px; color:var(--mut); margin-top:4px; }
  .row .acts{ font-size:11px; color:var(--am); margin-top:4px; }
  .empty{ color:var(--mut); text-align:center; padding:30px 0; font-size:13px; }
  .err{ background:rgba(248,81,73,0.12); border:1px solid rgba(248,81,73,0.3); color:var(--red); padding:14px; border-radius:10px; }
  h2{ font-size:13px; color:var(--mut); letter-spacing:0.1em; text-transform:uppercase; margin:18px 0 10px; }
</style>
</head>
<body>
  <h1>🧪 AI Lab <span class="badge b-model" id="model-badge">FABLE 5</span> <span class="badge b-paper">PAPER · FREE-SCAN</span></h1>
  <div class="sub" id="status">connecting…</div>
  <div class="cards" id="cards"></div>
  <div class="panels" id="panels"></div>
  <h2>Recent results & actions</h2>
  <div class="feed" id="feed"><div class="empty">Loading…</div></div>

<script>
var charts = {}; // coin → {chart, series, lines}
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
function fmtR(x){ if(x==null) return '—'; var v=parseFloat(x); return (v>=0?'+':'')+v.toFixed(2)+'R'; }
function ago(iso){ if(!iso) return '—'; var s=Math.floor((Date.now()-new Date(iso).getTime())/1000); if(s<90) return s+'s ago'; if(s<5400) return Math.round(s/60)+'m ago'; return Math.round(s/3600)+'h ago'; }

function card(l,v,cls){ return '<div class="c"><div class="l">'+l+'</div><div class="v '+(cls||'')+'">'+v+'</div></div>'; }

function ensurePanel(p){
  if(charts[p.coin]) return charts[p.coin];
  var wrap = document.createElement('div'); wrap.className='panel';
  wrap.innerHTML = '<div class="hd"><span class="nm">'+esc(p.coin.replace('USDT',''))+'</span><span class="dir" id="dir-'+p.coin+'" style="display:none"></span><span class="st" id="st-'+p.coin+'"></span></div><div class="chart" id="ch-'+p.coin+'"></div>';
  document.getElementById('panels').appendChild(wrap);
  var box = wrap.querySelector('.chart');
  var chart = LightweightCharts.createChart(box,{
    layout:{ background:{type:'solid',color:'rgba(0,0,0,0)'}, textColor:'#5a5f7a', fontSize:10 },
    grid:{ vertLines:{color:'rgba(255,255,255,0.03)'}, horzLines:{color:'rgba(255,255,255,0.03)'} },
    timeScale:{ timeVisible:true, secondsVisible:false, borderColor:'rgba(255,255,255,0.08)' },
    rightPriceScale:{ borderColor:'rgba(255,255,255,0.08)' },
    width: box.clientWidth||480, height: 260, handleScroll:false, handleScale:false,
  });
  var series = chart.addCandlestickSeries({ upColor:'#3fb950', downColor:'#f85149', borderUpColor:'#3fb950', borderDownColor:'#f85149', wickUpColor:'#3fb950', wickDownColor:'#f85149' });
  charts[p.coin] = { chart: chart, series: series, lines: [] };
  window.addEventListener('resize', function(){ try{ chart.resize(box.clientWidth, 260); }catch(e){} });
  return charts[p.coin];
}

function render(d){
  document.getElementById('model-badge').textContent = (d.model||'').replace('claude-','').replace(/-/g,' ').toUpperCase();
  document.getElementById('status').textContent =
    'scans BTC + GOLD every ' + d.scanEveryMin + ' min · manages every ' + d.manageEveryMin + ' min · last scan ' + ago(d.lastScanAt) + ' · gold pauses on weekends · separate paper record';
  var s = d.stats || {};
  document.getElementById('cards').innerHTML =
    card('Net R', fmtR(s.netR), (s.netR||0) >= 0 ? 'pos':'neg')
    + card('Trades', s.trades ?? 0)
    + card('Win rate', s.winRate != null ? s.winRate + '%' : '—')
    + card('TP / SL / BE', (s.tp||0) + ' / ' + (s.sl||0) + ' / ' + (s.be||0))
    + card('Open now', (d.pairs||[]).filter(function(p){ return p.open; }).length);

  (d.pairs||[]).forEach(function(p){
    var e = ensurePanel(p);
    var data = (p.candles||[]).map(function(c){ return { time: Math.floor(c.t/1000), open:c.o, high:c.h, low:c.l, close:c.c }; })
      .sort(function(a,b){ return a.time-b.time; });
    var seen={}; data = data.filter(function(c){ if(seen[c.time])return false; seen[c.time]=1; return true; });
    if(data.length) e.series.setData(data);
    e.lines.forEach(function(ln){ try{ e.series.removePriceLine(ln); }catch(x){} }); e.lines = [];
    var dirEl = document.getElementById('dir-'+p.coin), stEl = document.getElementById('st-'+p.coin);
    if(p.open){
      dirEl.style.display=''; dirEl.textContent = p.open.direction; dirEl.className = 'dir ' + p.open.direction.toLowerCase();
      stEl.textContent = 'opened ' + ago(p.open.openedAt) + (p.open.aiManaged ? ' · AI-managed' : '');
      e.lines.push(e.series.createPriceLine({ price:+p.open.entry, color:'#9aa0a6', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dashed, axisLabelVisible:true, title:'ENTRY' }));
      e.lines.push(e.series.createPriceLine({ price:+p.open.sl, color:'#f85149', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Solid, axisLabelVisible:true, title:'SL' }));
      e.lines.push(e.series.createPriceLine({ price:+p.open.tp, color:'#3fb950', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Solid, axisLabelVisible:true, title:'TP' }));
    } else {
      dirEl.style.display='none';
      stEl.textContent = p.scanNote ? esc(p.scanNote) : 'scanning hourly';
    }
  });

  var rows = d.recent || [];
  var feed = document.getElementById('feed');
  if(!rows.length){ feed.innerHTML = '<div class="empty">No closed paper trades yet — the first hourly free-scan entry will appear here and on Discord.</div>'; return; }
  feed.innerHTML = rows.map(function(r){
    var rr = parseFloat(r.outcome_rr)||0;
    var acts = (r.actions||[]).map(function(a){ return a.action + (a.to!=null?(' → '+a.to):'') }).join(' · ');
    return '<div class="row"><div class="top">'
      + '<span class="dir '+(r.direction==='LONG'?'long':'short')+'">'+r.direction+'</span>'
      + '<b>'+esc(r.pair.replace('USDT',''))+'</b>'
      + '<span style="color:var(--mut);font-size:12px">'+esc(r.outcome||'')+(r.ai_managed?' · 🤖 managed':'')+' · '+ago(r.closed_at)+'</span>'
      + '<span class="r '+(rr>=0?'pos':'neg')+'">'+fmtR(r.outcome_rr)+'</span></div>'
      + (r.reasoning ? '<div class="why">'+esc(r.reasoning)+'</div>' : '')
      + (acts ? '<div class="acts">🤖 '+esc(acts)+'</div>' : '')
      + '</div>';
  }).join('');
}

function load(){
  fetch('/api/lab/state',{credentials:'same-origin'}).then(function(r){
    if(r.status===403){ document.getElementById('feed').innerHTML='<div class="err">Admin only. Log in with the admin account.</div>'; document.getElementById('status').textContent=''; return null; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){ if(d) render(d); })
  .catch(function(){ document.getElementById('status').textContent='connection error — retrying…'; });
}
load(); setInterval(load, 60000);
</script>
</body>
</html>
