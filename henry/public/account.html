<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Henry The Hoover — Account</title>
<style>
  :root{--bg:#08090d;--bg2:#12141b;--fg:#e8eaf0;--mu:#9aa0a6;--br:#23262e;--cy:#00d4ff;--gr:#00e5a0;--re:#ff4466;--am:#ffb830}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .box{background:var(--bg2);border:1px solid var(--br);padding:32px 28px;width:100%;max-width:400px;border-radius:6px}
  h1{margin:0 0 4px;font-size:18px;letter-spacing:.12em;color:var(--cy)}
  .sub{color:var(--mu);font-size:11px;letter-spacing:.08em;margin-bottom:28px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px}
  .row:last-of-type{border-bottom:0}
  .lbl{color:var(--mu);letter-spacing:.08em}
  .val{color:var(--fg);font-weight:bold;letter-spacing:.05em}
  .val.active{color:var(--gr)}
  .val.inactive,.val.cancelled,.val.past_due,.val.expired{color:var(--re)}
  .val.admin{color:var(--cy)}
  .days-left{font-size:9px;color:var(--mu);margin-top:2px;letter-spacing:.06em}
  .days-left.warn{color:var(--am)}
  .days-left.urgent{color:var(--re)}
  .section{margin-top:24px}
  .section-title{font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.25);margin-bottom:10px}
  button{width:100%;margin-top:10px;padding:11px;border:1px solid var(--br);background:transparent;color:var(--fg);font-family:inherit;font-size:11px;letter-spacing:.1em;cursor:pointer;border-radius:3px;transition:border-color .15s}
  button:hover{border-color:var(--cy);color:var(--cy)}
  button:disabled{opacity:.5;cursor:wait}
  button.danger{border-color:rgba(255,68,102,.3);color:var(--re)}
  button.danger:hover{border-color:var(--re);background:rgba(255,68,102,.06)}
  button.primary{background:var(--cy);color:#000;border-color:var(--cy);font-weight:bold}
  button.primary:hover{background:#00bce0}
  button.crypto{background:linear-gradient(135deg,#f7931a 0%,#627eea 50%,#9945ff 100%);color:#fff;border-color:transparent;font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  button.crypto:hover{filter:brightness(1.1)}
  .msg{margin-top:14px;padding:11px;border:1px solid var(--br);border-radius:3px;font-size:11px;line-height:1.6}
  .msg.ok{border-color:rgba(0,229,160,.4);color:var(--gr);background:rgba(0,229,160,.06)}
  .msg.err{border-color:rgba(255,68,102,.4);color:var(--re);background:rgba(255,68,102,.06)}
  .back{margin-top:20px;text-align:center;font-size:10px}
  .back a{color:var(--mu);text-decoration:none}
  .back a:hover{color:var(--cy)}
</style>
</head>
<body>
<div class="box">
  <h1>HENRY THE HOOVER</h1>
  <div class="sub">ACCOUNT</div>

  <div class="row"><span class="lbl">EMAIL</span><span class="val" id="a-email">—</span></div>
  <div class="row"><span class="lbl">PLAN</span><span class="val" id="a-plan">—</span></div>
  <div class="row"><span class="lbl">STATUS</span><span class="val" id="a-status">—</span></div>
  <div class="row">
    <span class="lbl">RENEWS</span>
    <span style="text-align:right">
      <span class="val" id="a-renews">—</span>
      <div class="days-left" id="a-days-left"></div>
    </span>
  </div>

  <div id="msg"></div>

  <div class="section">
    <div class="section-title">ACTIONS</div>
    <button class="primary" onclick="goTerminal()">← BACK TO TERMINAL</button>
    <!-- Renew / Subscribe — only visible to non-admin users -->
    <button id="renew-whop-btn" class="primary" onclick="renewWhop()" style="display:none">RENEW VIA WHOP — $500 / MONTH</button>
    <button id="renew-btn" class="crypto" onclick="renewCrypto()" style="display:none">⚡ ONE-OFF CRYPTO RENEW (NOWPAYMENTS)</button>
    <button id="cancel-btn" class="danger" onclick="cancelSub()" style="display:none">CANCEL SUBSCRIPTION</button>
    <button onclick="doLogout()">LOG OUT</button>
  </div>

  <div class="back"><a href="/">← Terminal</a></div>
</div>
<script>
const msg = document.getElementById('msg');
let _nowpayEnabled = false;
let _whopEnabled = false;

async function load() {
  try {
    // Probe payment configs first so we know which renew buttons to show
    try {
      const wr = await fetch('/api/whop/config');
      if (wr.ok) { const c = await wr.json(); _whopEnabled = !!c.enabled; }
    } catch (e) {}
    try {
      const cr = await fetch('/api/nowpayments/config');
      if (cr.ok) { const c = await cr.json(); _nowpayEnabled = !!c.enabled; }
    } catch (e) {}

    const r = await fetch('/api/me', { credentials: 'same-origin' });
    if (!r.ok) { window.location.href = '/login'; return; }
    const d = await r.json();
    document.getElementById('a-email').textContent  = d.email || '—';
    const planEl    = document.getElementById('a-plan');
    const statusEl  = document.getElementById('a-status');
    const renewsEl  = document.getElementById('a-renews');
    const daysEl    = document.getElementById('a-days-left');
    const renewBtn  = document.getElementById('renew-btn');
    const cancelBtn = document.getElementById('cancel-btn');

    if (d.is_admin && d.plan === 'admin') {
      planEl.textContent   = 'ADMIN';
      planEl.className     = 'val admin';
      statusEl.textContent = 'FULL ACCESS';
      statusEl.className   = 'val admin';
      renewsEl.textContent = '—';
      return; // admin doesn't need renew/cancel buttons
    }

    // Pretty plan label
    const planRaw = (d.plan || 'none').toLowerCase();
    planEl.textContent = planRaw === 'monthly_whop'   ? 'PRO MONTHLY (WHOP)'
                      : planRaw === 'monthly'         ? 'PRO MONTHLY (CARD)'
                      : planRaw === 'monthly_crypto'  ? 'PRO MONTHLY (CRYPTO)'
                      : planRaw === 'lifetime'        ? 'LIFETIME'
                      : (planRaw || 'NONE').toUpperCase();

    const st = (d.subscription_status || 'inactive').toLowerCase();
    statusEl.textContent = st.toUpperCase();
    statusEl.className   = 'val ' + st;

    // Days-left + renew prompt logic
    if (d.current_period_end) {
      const endMs = new Date(d.current_period_end).getTime();
      renewsEl.textContent = new Date(endMs).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
      const daysLeft = Math.ceil((endMs - Date.now()) / 86400000);
      if (daysLeft > 0) {
        daysEl.textContent = daysLeft + ' day' + (daysLeft===1?'':'s') + ' left';
        daysEl.className   = 'days-left' + (daysLeft <= 3 ? ' urgent' : daysLeft <= 7 ? ' warn' : '');
      } else {
        daysEl.textContent = 'EXPIRED ' + (-daysLeft) + ' day' + (daysLeft===-1?'':'s') + ' ago';
        daysEl.className   = 'days-left urgent';
      }
    } else {
      renewsEl.textContent = '—';
      daysEl.textContent   = '';
    }

    // Show renew buttons — Whop primary, NowPayments fallback
    const whopBtn = document.getElementById('renew-whop-btn');
    if (_whopEnabled) {
      whopBtn.style.display = '';
      if (st === 'active' && planRaw === 'monthly_whop') {
        // Already auto-renewing via Whop — label changes to manage
        whopBtn.textContent = 'MANAGE WHOP SUBSCRIPTION →';
      } else if (st === 'active') {
        whopBtn.textContent = 'SWITCH TO WHOP — $500 / MONTH';
      } else {
        whopBtn.textContent = 'SUBSCRIBE VIA WHOP — $500 / MONTH';
      }
    }
    if (_nowpayEnabled) {
      renewBtn.style.display = '';
      if (st === 'active') {
        renewBtn.textContent = '⚡ ADD 30 DAYS (CRYPTO ONE-OFF)';
      } else {
        renewBtn.textContent = '⚡ SUBSCRIBE WITH CRYPTO ONE-OFF';
      }
    }
    if (st === 'active' && planRaw === 'monthly') cancelBtn.style.display = ''; // only Paddle subs can be cancelled mid-cycle
  } catch (e) {
    window.location.href = '/login';
  }
}

// Whop renew — starts checkout via /api/whop/checkout which builds the URL with metadata.
async function renewWhop() {
  const btn = document.getElementById('renew-whop-btn');
  btn.disabled = true; btn.textContent = 'OPENING WHOP…';
  msg.className = ''; msg.textContent = '';
  try {
    const r = await fetch('/api/whop/checkout', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
    });
    const d = await r.json();
    if (!r.ok || !d.checkoutUrl) {
      msg.className = 'msg err';
      msg.textContent = d.error || 'Could not start Whop checkout. Try again.';
      btn.disabled = false; load();
      return;
    }
    window.location.href = d.checkoutUrl;
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Network error: ' + e.message;
    btn.disabled = false; load();
  }
}

function goTerminal() { window.location.href = '/terminal'; }

// Crypto renew — creates a fresh NowPayments invoice and redirects to it.
// Webhook stacks +30 days from whichever is later: now or current_period_end.
async function renewCrypto() {
  const btn = document.getElementById('renew-btn');
  btn.disabled = true; btn.textContent = 'CREATING INVOICE…';
  msg.className = ''; msg.textContent = '';
  try {
    const r = await fetch('/api/nowpayments/create-invoice', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
    });
    const d = await r.json();
    if (!r.ok || !d.invoiceUrl) {
      msg.className = 'msg err';
      msg.textContent = d.detail || d.error || 'Could not create invoice. Try again.';
      btn.disabled = false; btn.textContent = '⚡ RENEW WITH CRYPTO — +30 DAYS';
      return;
    }
    msg.className = 'msg ok'; msg.textContent = 'Redirecting to NowPayments…';
    window.location.href = d.invoiceUrl;
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Network error: ' + e.message;
    btn.disabled = false; btn.textContent = '⚡ RENEW WITH CRYPTO — +30 DAYS';
  }
}

async function cancelSub() {
  if (!confirm('Cancel subscription? You keep access until the end of the billing period.')) return;
  const btn = document.getElementById('cancel-btn');
  btn.disabled = true; btn.textContent = '...';
  msg.className = ''; msg.textContent = '';
  try {
    const r = await fetch('/api/paddle/cancel', { method: 'POST', credentials: 'same-origin' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      msg.className = 'msg err';
      msg.textContent = d.error || 'Cancel failed.';
      btn.disabled = false; btn.textContent = 'CANCEL SUBSCRIPTION';
    } else {
      msg.className = 'msg ok';
      msg.textContent = 'Subscription cancelled. Access continues until billing period ends.';
      btn.style.display = 'none';
      document.getElementById('a-status').textContent = 'CANCELLED';
      document.getElementById('a-status').className = 'val cancelled';
    }
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Network error: ' + e.message;
    btn.disabled = false; btn.textContent = 'CANCEL SUBSCRIPTION';
  }
}

async function doLogout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' }).catch(() => {});
  window.location.href = '/login';
}

load();
</script>
</body>
</html>
