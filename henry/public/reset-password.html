<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Henry The Hoover — Set New Password</title>
<style>
  :root{--bg:#08090d;--bg2:#12141b;--fg:#e8eaf0;--mu:#9aa0a6;--br:#23262e;--cy:#00d4ff;--gr:#00e5a0;--re:#ff4466}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .box{background:var(--bg2);border:1px solid var(--br);padding:32px 28px;width:100%;max-width:380px;border-radius:6px}
  h1{margin:0 0 4px;font-size:18px;letter-spacing:.12em;color:var(--cy)}
  .sub{color:var(--mu);font-size:11px;letter-spacing:.08em;margin-bottom:24px}
  label{display:block;font-size:10px;color:var(--mu);letter-spacing:.1em;margin-bottom:6px;margin-top:14px}
  input{width:100%;padding:12px;background:#0a0c12;border:1px solid var(--br);color:var(--fg);font-family:inherit;font-size:16px;border-radius:3px;outline:none}
  input:focus{border-color:var(--cy)}
  button{width:100%;margin-top:18px;padding:12px;background:var(--cy);color:#000;border:0;font-family:inherit;font-size:12px;letter-spacing:.12em;font-weight:bold;cursor:pointer;border-radius:3px}
  button:disabled{opacity:.5;cursor:wait}
  .msg{margin-top:16px;padding:12px;border:1px solid var(--br);border-radius:3px;font-size:11px;line-height:1.6}
  .msg.ok{border-color:rgba(0,229,160,.4);color:var(--gr);background:rgba(0,229,160,.06)}
  .msg.err{border-color:rgba(255,68,102,.4);color:var(--re);background:rgba(255,68,102,.06)}
</style>
</head>
<body>
<div class="box">
  <h1>HENRY THE HOOVER</h1>
  <div class="sub">SET NEW PASSWORD</div>
  <form id="f">
    <label>NEW PASSWORD</label>
    <input id="pw" type="password" required minlength="8" autocomplete="new-password" placeholder="Min 8 characters">
    <label>CONFIRM PASSWORD</label>
    <input id="pw2" type="password" required minlength="8" autocomplete="new-password" placeholder="Repeat password">
    <button id="go" type="submit">SET PASSWORD</button>
  </form>
  <div id="msg"></div>
</div>
<script>
const msg = document.getElementById('msg');

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw  = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw !== pw2) {
    msg.className = 'msg err';
    msg.textContent = 'Passwords do not match.';
    return;
  }
  if (pw.length < 8) {
    msg.className = 'msg err';
    msg.textContent = 'Password must be at least 8 characters.';
    return;
  }
  const btn = document.getElementById('go');
  btn.disabled = true; btn.textContent = '...';
  msg.className = ''; msg.textContent = '';
  try {
    const r = await fetch('/api/auth/update-password', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      msg.className = 'msg err';
      msg.textContent = d.error || 'Password update failed.';
      btn.disabled = false; btn.textContent = 'SET PASSWORD';
    } else {
      msg.className = 'msg ok';
      msg.textContent = 'Password set! Redirecting to terminal…';
      setTimeout(() => { window.location.href = '/terminal'; }, 1500);
    }
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = 'Network error: ' + err.message;
    btn.disabled = false; btn.textContent = 'SET PASSWORD';
  }
});
</script>
</body>
</html>
